<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tonle Sap Project</title>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

  <style>
    :root {
      --main-green: #27ae60;
      --main-blue: #2980b9;
      --bg-color: #f4f7f6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background: var(--bg-color);
      display: flex;
      justify-content: center;
      color: #333;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: white;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
      position: relative;
      padding-bottom: 80px;
    }

    .header {
      text-align: center;
      border-bottom: 2px solid var(--main-green);
      padding-bottom: 15px;
      margin-bottom: 25px;
    }

    .house-id-badge {
      background: #e8f5e9;
      color: var(--main-green);
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 1.1em;
      display: inline-block;
      margin-top: 10px;
    }

    .menu-card {
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    button {
      width: 100%;
      padding: 16px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:active {
      opacity: 0.8;
    }

    .btn-green {
      background: var(--main-green);
      color: white;
    }

    .btn-blue {
      background: var(--main-blue);
      color: white;
    }

    .btn-outline {
      background: transparent;
      border: 2px solid #ccc;
      color: #555;
    }

    .khmer-text {
      font-size: 1.3em;
      font-weight: bold;
      display: block;
      margin-bottom: 4px;
    }

    .eng-text {
      font-size: 1em;
      display: block;
      margin-bottom: 2px;
    }

    .jap-text {
      font-size: 0.75em;
      color: #666;
      display: block;
    }

    input, select, textarea {
      width: 100%;
      padding: 14px;
      margin: 8px 0 16px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 16px;
    }

    label {
      font-weight: bold;
      color: #444;
      font-size: 0.9em;
    }

    #map {
      width: 100%;
      height: 350px;
      border-radius: 12px;
      margin-top: 15px;
      border: 1px solid #ddd;
      z-index: 1;
    }

    .hidden {
      display: none;
    }

    .history-item {
      border-bottom: 1px solid #eee;
      padding: 15px 0;
      font-size: 0.9em;
    }

    .history-item strong {
      color: var(--main-blue);
      font-size: 1.1em;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 0.7em;
      color: #888;
      line-height: 1.4;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="header">
      <span class="khmer-text">គម្រោងទន្លេសាប</span>
      <span class="eng-text">Tonle Sap Project</span>
      <span class="jap-text">仙台二華課題研究　雨水グループ　トンレサップ湖浄化プロジェクト</span>
      
      <div class="house-id-badge" style="display: flex; align-items: center; gap: 6px; justify-content: center; margin: 10px auto; max-width: 300px;">
        <span>ID:</span>
        <input type="text" id="input-house-id" value="Loading..." style="margin: 0; padding: 4px 6px; width: 100px; font-weight: bold; text-align: center; border: 1px solid #ccc; border-radius: 4px; height: 30px;">
        <button onclick="changeHouseIdHandy()" style="width: auto; margin: 0; padding: 0 12px; font-size: 0.8em; background: var(--main-green); color: white; height: 30px; line-height: 30px;">変更</button>
      </div>
    </div>

    <div id="view-main">
      <div class="menu-card" style="border-left: 8px solid var(--main-green)">
        <span class="khmer-text">សម្រាប់អ្នកភូមិ</span>
        <span class="eng-text" style="font-weight: bold;">For Residents</span>
        <span class="jap-text">住民の方へ</span>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

        <button class="btn-green" onclick="logAndOpen('パンフレット閲覧', 'YOUR_PAMPHLET_URL')">
            <span class="khmer-text" style="font-size: 1.1em; color:white;">ខិត្តប័ណ្ណ</span>
            <span class="eng-text" style="color:white;">Read Pamphlet</span>
            <span class="jap-text" style="color:#e8f5e9;">パンフレットを見る</span>
        </button>
        <button class="btn-green" onclick="logAndOpen('動画視聴', 'YOUR_VIDEO_URL')">
            <span class="khmer-text" style="font-size: 1.1em; color:white;">វីដេអូ</span>
            <span class="eng-text" style="color:white;">Watch Video</span>
            <span class="jap-text" style="color:#e8f5e9;">動画を見る</span>
        </button>
      </div>

      <div style="margin-top: 40px;">
        <button class="btn-outline" onclick="checkAuth()">
            <span class="khmer-text" style="font-size: 1em;">អ្នកស្រាវជ្រាវ</span>
            <span class="eng-text">Researcher Login</span>
            <span class="jap-text">調査員用ログイン</span>
        </button>
      </div>
    </div>

    <div id="view-researcher" class="hidden">
      <div class="menu-card" style="border-left: 8px solid var(--main-blue)">
        <h3 style="margin-top: 0; color: var(--main-blue);">📋 調査員メニュー</h3>
        <p style="font-size: 0.9em; color: #666;">対象世帯の記録と履歴の確認を行います</p>
        <button class="btn-blue" onclick="showView('view-form')">✍️ 新規調査記録</button>
        <button class="btn-outline" onclick="showView('view-history')">🗺️ 過去の履歴と地図を見る</button>
        <button class="btn-outline" onclick="location.reload()" style="margin-top: 20px; border-color: #ffcccc; color: #d32f2f;">🚪 ログアウト</button>
      </div>
    </div>

    <div id="view-form" class="hidden">
      <h3 style="color: var(--main-blue);">✍️ 新規調査記録</h3>

      <label>調査員名</label>
      <input type="text" id="inspector" placeholder="例: Kunisealiner880">

      <label>家主の氏名（Owner Name）</label>
      <input type="text" id="ownerName" placeholder="例: Sok San">

      <label>世帯人数</label>
      <input type="number" id="familySize" placeholder="例: 5">

      <label>雨樋（あまどい）の有無</label>
      <select id="hasGutter">
          <option value="未確認">選択してください</option>
          <option value="あり (Yes)">あり (Yes)</option>
          <option value="なし (No)">なし (No)</option>
          <option value="破損・修理が必要">破損・修理が必要</option>
      </select>

      <label>その他メモ（家の状態、ヒアリング内容など）</label>
      <textarea id="notes" rows="4" placeholder="調査メモを入力..."></textarea>

      <button class="btn-blue" id="save-btn" onclick="submitSurvey()">💾 現在地を取得して保存</button>
      <button class="btn-outline" onclick="showView('view-researcher')">戻る</button>
    </div>

    <div id="view-history" class="hidden">
      <h3 style="color: var(--main-blue);">🗺️ 位置情報と調査履歴</h3>
      <div id="map"></div>
      <div id="history-list" style="margin-top: 20px;"></div>
      <button class="btn-outline" onclick="showView('view-researcher')" style="margin-top: 20px;">戻る</button>
    </div>

    <div class="footer">
      @SendaiNikaHighSchool2026 Global Study II Rainwater group<br>
      System creat by kunisealiner
    </div>
  </div>

  <script>
    // Firebaseの設定
    const firebaseConfig = {
      apiKey: "AIzaSyAo6bkTvrBpu6hnXSf9lXRGGva98XTT5GQ",
      authDomain: "tonle-sap-housetracking-system.firebaseapp.com",
      projectId: "tonle-sap-housetracking-system",
      storageBucket: "tonle-sap-housetracking-system.firebasestorage.app",
      messagingSenderId: "520284876180",
      appId: "1:520284876180:web:a671306e8429f6673ab381",
      measurementId: "G-27MLCJEHEM"
    };

    // Firebaseの初期化
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // URLから家IDを取得（QRコードの ?id=H-01 の部分）
    const urlParams = new URLSearchParams(window.location.search);
    // 【修正】houseIdを書き換え可能な変数(let)に変更
    let houseId = urlParams.get('id') || 'TEST-HOUSE';
    
    // 画面の入力欄に初期のHouse IDを表示する
    document.getElementById('input-house-id').value = houseId;

    let map;
    let markersGroup; // 地図のピンをリセットするためのグループ

    // 画面切り替え関数
    function showView(id) {
        document.querySelectorAll('.container > div[id^="view-"]').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'view-history') initMap();
    }

    // 調査員ログイン（簡易パスワード）
    function checkAuth() {
        const pass = prompt("調査員用パスワードを入力してください:");
        if(pass === "RJSS") {
            showView('view-researcher');
        } else if (pass !== null) {
            alert("パスワードが違います");
        }
    }

    // 【追加】ユーザーが画面上でIDを手動変更したときに動く関数
    function changeHouseIdHandy() {
        const newId = document.getElementById('input-house-id').value.trim();
        if (!newId) {
            alert("IDを空欄にすることはできません。");
            document.getElementById('input-house-id').value = houseId; // 元に戻す
            return;
        }
        
        // アプリ内の変数を新しいIDに書き換え
        houseId = newId;
        alert(`House ID を 「${houseId}」 に変更しました！`);
        
        // もし現在「過去の履歴と地図を見る」画面が開いているなら、即座にFirestoreから新しいデータを再読み込みする
        const historyView = document.getElementById('view-history');
        if (!historyView.classList.contains('hidden')) {
            loadHistory();
        }
    }

    // 地図の初期化と履歴読み込み
    function initMap() {
        if(!map) {
            // トンレサップ湖付近の座標をデフォルトに
            map = L.map('map').setView([12.5, 104.1], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
            
            // ピンを管理するグループを作成して地図に追加
            markersGroup = L.layerGroup().addTo(map);
        }
        loadHistory();
    }

    // 住民のボタンクリックを記録して別タブで開く関数
    function logAndOpen(actionType, targetUrl) {
        const gasUrl = "https://script.google.com/macros/s/AKfycbyPIhxqIx_M9YmYtdgFWcxJVqE7m93UdCHQIG5zkZJ4d13kTLndkYxoDWaLVeMAZyKDHg/exec";
        
        const logUrl = `${gasUrl}?houseId=${encodeURIComponent(houseId)}&action=${encodeURIComponent(actionType)}&url=${encodeURIComponent(targetUrl)}`;
        
        fetch(logUrl, { mode: 'no-cors' });
        window.open(targetUrl, '_blank');
    }

    // Firestoreからデータを取得して表示
    function loadHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = "<p style='text-align:center;'>データを読み込み中...</p>";
        
        // 前の家のピンが地図に残っている場合があるので、一旦全部クリアする
        if (markersGroup) {
            markersGroup.clearLayers();
        }
        
        db.collection("house_logs")
          .where("houseId", "==", houseId)
          .orderBy("timestamp", "desc")
          .get()
          .then(snap => {
            list.innerHTML = "";
            let coords = [];
            
            if(snap.empty) {
                list.innerHTML = `<p style='text-align:center; color:#666;'>「${houseId}」の記録はまだありません。</p>`;
                return;
            }

            snap.forEach(doc => {
                const d = doc.data();
                const date = d.timestamp ? d.timestamp.toDate().toLocaleString('ja-JP') : '日時不明';
                
                // 地図グループにピンを立てる
                L.marker([d.lat, d.lng]).addTo(markersGroup).bindPopup(`<b>${date}</b><br>家主: ${d.ownerName}`);
                coords.push([d.lat, d.lng]);

                // 履歴リストの作成
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <strong>${date}</strong> (調査員: ${d.inspector})<br>
                    家主: ${d.ownerName} | 世帯人数: ${d.familySize}人<br>
                    雨樋: <b>${d.hasGutter}</b><br>
                    メモ: ${d.note || 'なし'}
                `;
                list.appendChild(item);
            });
            
            // 全てのピンが収まるように地図をズーム
            if(coords.length > 0) map.fitBounds(coords, {padding: [30, 30]});
        }).catch(error => {
            console.error("Error getting documents: ", error);
            list.innerHTML = "<p style='color:red;'>データの読み込みに失敗しました。オフラインの可能性があります。</p>";
        });
    }

    // データ保存処理
    function submitSurvey() {
        const inspector = document.getElementById('inspector').value;
        const ownerName = document.getElementById('ownerName').value;
        const familySize = document.getElementById('familySize').value;
        const hasGutter = document.getElementById('hasGutter').value;
        const note = document.getElementById('notes').value;

        if(!inspector || !ownerName) {
            return alert("「調査員名」と「家主の氏名」は必ず入力してください。");
        }

        const btn = document.getElementById('save-btn');
        btn.disabled = true;
        btn.innerText = "⏳ 位置情報を取得中...";

        // GPSで現在地を取得
        navigator.geolocation.getCurrentPosition(pos => {
            btn.innerText = "⏳ クラウドへ保存中...";
            
            const gasUrl = "https://script.google.com/macros/s/AKfycbyPIhxqIx_M9YmYtdgFWcxJVqE7m93UdCHQIG5zkZJ4d13kTLndkYxoDWaLVeMAZyKDHg/exec";

            const params = new URLSearchParams();
            params.append('houseId', houseId);
            params.append('inspector', inspector);
            params.append('ownerName', ownerName);
            params.append('familySize', familySize);
            params.append('hasGutter', hasGutter);
            params.append('note', note);
            params.append('lat', pos.coords.latitude);
            params.append('lng', pos.coords.longitude);

            fetch(gasUrl, {
                method: "POST",
                mode: "no-cors",
                body: params
            });

            // 既存のFirestore保存処理
            db.collection("house_logs").add({
                houseId: houseId,
                inspector: inspector,
                ownerName: ownerName,
                familySize: familySize,
                hasGutter: hasGutter,
                note: note,
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert("データの保存が完了しました！");
                document.getElementById('ownerName').value = '';
                document.getElementById('familySize').value = '';
                document.getElementById('notes').value = '';
                document.getElementById('hasGutter').selectedIndex = 0;
                btn.disabled = false;
                btn.innerText = "💾 現在地を取得して保存";
                showView('view-history'); 
            }).catch(error => {
                alert("保存エラー: " + error.message);
                btn.disabled = false;
                btn.innerText = "💾 現在地を取得して保存";
            });
            
        }, error => {
            alert("位置情報の取得に失敗しました。端末のGPS（位置情報）がオンになっているか確認してください。");
            btn.disabled = false;
            btn.innerText = "💾 現在地を取得して保存";
        }, {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        });
    }
  </script>
</body>

</html>
